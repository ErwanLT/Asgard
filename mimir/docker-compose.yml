version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: mimir-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mimir-network
      - asgard-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.18.0
    container_name: mimir-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ../logstash/config:/usr/share/logstash/config
      - ../logstash/pipeline:/usr/share/logstash/pipeline
      - ../logs:/logs
    ports:
      - "5044:5044"   # Beats
      - "5000:5000"   # TCP/UDP
      - "9600:9600"   # Logstash API
    depends_on:
      - elasticsearch
    networks:
      - mimir-network
      - asgard-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.2
    container_name: mimir-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - mimir-network

volumes:
  elasticsearch-data:
    driver: local

networks:
  mimir-network:
    driver: bridge
  asgard-network:
    name: asgard-network
    external: true 